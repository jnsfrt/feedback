<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f1117;--sf:#1a1d27;--sf2:#222636;--bd:#2a2e3d;
  --tx:#e4e6ed;--mu:#7a7f94;--ac:#6C5CE7;--acl:#8577ed;
  --gn:#00b894;--or:#fdcb6e;--rd:#e17055;--inp:#13151d;--cd:#1e2130;
  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Outfit',-apple-system,sans-serif;background:var(--bg);color:var(--tx);
  min-height:100vh;min-height:100dvh;overscroll-behavior:none;overflow:hidden}
input,textarea,button,select{font-family:inherit;outline:none}
textarea{-webkit-appearance:none}
.view{display:none;flex-direction:column;height:100vh;height:100dvh}
.view.active{display:flex}
.hdr{position:sticky;top:0;z-index:50;background:var(--sf);border-bottom:1px solid var(--bd);
  padding:calc(var(--sat) + 10px) 16px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-icon{width:34px;height:34px;border-radius:9px;
  background:linear-gradient(135deg,var(--ac),#74b9ff);display:flex;align-items:center;justify-content:center;font-size:17px}
.hdr-title{font-weight:700;font-size:15px}
.hdr-sub{font-size:11px;color:var(--mu)}
.hdr-actions{display:flex;gap:6px}
.btn{border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;
  transition:all .15s;display:flex;align-items:center;gap:5px}
.btn-ghost{background:var(--sf2);color:var(--tx);border:1px solid var(--bd)}
.btn-accent{background:var(--ac);color:#fff}
.btn-green{background:var(--gn);color:#fff}
.btn-sm{padding:6px 10px;font-size:11px}
.list-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 0;
  padding-bottom:calc(var(--sab) + 80px)}
.list-item{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid var(--bd);
  cursor:pointer;transition:background .1s;gap:12px}
.list-item:active{background:var(--sf2)}
.li-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.li-dot.filled{background:var(--gn)}
.li-dot.empty{background:var(--bd)}
.li-info{flex:1;min-width:0}
.li-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-meta{font-size:11px;color:var(--mu);margin-top:2px}
.li-arrow{color:var(--mu);font-size:18px;flex-shrink:0}
.list-fab{position:fixed;bottom:calc(var(--sab) + 20px);right:20px;width:54px;height:54px;
  border-radius:50%;background:var(--ac);color:#fff;border:none;font-size:26px;
  box-shadow:0 4px 20px rgba(108,92,231,.4);cursor:pointer;z-index:40;
  display:flex;align-items:center;justify-content:center}
.search-bar{padding:8px 16px;border-bottom:1px solid var(--bd)}
.search-input{width:100%;background:var(--inp);border:1px solid var(--bd);border-radius:10px;
  padding:10px 14px;color:var(--tx);font-size:14px}
.search-input::placeholder{color:var(--mu)}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:var(--mu);gap:12px;padding:40px}
.empty-state .big{font-size:48px}
.edit-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:16px 16px calc(var(--sab) + 90px)}
.edit-name{width:100%;background:transparent;border:none;border-bottom:2px solid var(--bd);
  padding:8px 0;color:var(--tx);font-size:22px;font-weight:700;margin-bottom:16px}
.edit-name::placeholder{color:var(--mu)}
.edit-label{font-size:11px;font-weight:600;color:var(--mu);text-transform:uppercase;
  letter-spacing:.8px;margin-bottom:6px;display:block}
.edit-textarea{width:100%;background:var(--inp);border:1px solid var(--bd);border-radius:10px;
  padding:12px;color:var(--tx);font-size:13px;resize:none;line-height:1.6;min-height:70px}
.edit-textarea::placeholder{color:var(--mu)}
.category-card{background:var(--cd);border:1px solid var(--bd);border-radius:12px;
  padding:14px;margin-bottom:12px}
.cat-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.cat-emoji{font-size:16px}
.cat-pill{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.4px}
.edit-nav{position:fixed;bottom:0;left:0;right:0;z-index:40;
  background:var(--sf);border-top:1px solid var(--bd);
  padding:10px 16px calc(var(--sab) + 10px);display:flex;gap:8px}
.edit-nav .btn{flex:1;justify-content:center;padding:12px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;
  display:none;align-items:flex-end;justify-content:center}
.modal-overlay.active{display:flex}
.modal{background:var(--sf);border-radius:20px 20px 0 0;width:100%;max-height:85vh;
  padding:20px 16px calc(var(--sab) + 16px);animation:slideUp .25s ease-out}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;border-radius:2px;background:var(--bd);margin:0 auto 16px}
.modal h2{font-size:18px;font-weight:700;margin-bottom:4px}
.modal p{font-size:13px;color:var(--mu);margin-bottom:14px}
.modal textarea{width:100%;height:200px;background:var(--inp);border:1px solid var(--bd);
  border-radius:10px;padding:14px;color:var(--tx);font-size:14px;resize:none;line-height:1.6}
.modal textarea::placeholder{color:var(--mu)}
.modal-actions{display:flex;gap:8px;margin-top:14px}
.modal-actions .btn{flex:1;justify-content:center;padding:12px}
.toast{position:fixed;top:calc(var(--sat) + 70px);left:50%;transform:translateX(-50%);
  background:var(--gn);color:#fff;padding:10px 24px;border-radius:30px;font-size:13px;
  font-weight:600;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;
  box-shadow:0 4px 20px rgba(0,184,148,.3)}
.toast.show{opacity:1}
.share-modal textarea{width:100%;height:120px;background:var(--inp);border:1px solid var(--bd);
  border-radius:10px;padding:14px;color:var(--tx);font-size:11px;resize:none;line-height:1.4;font-family:monospace}
</style>
</head>
<body>

<div id="listView" class="view active">
  <div class="hdr">
    <div class="hdr-left">
      <div class="hdr-icon">💬</div>
      <div>
        <div class="hdr-title">Feedback Prep</div>
        <div class="hdr-sub" id="counter">0/0</div>
      </div>
    </div>
    <div class="hdr-actions">
      <button class="btn btn-ghost btn-sm" onclick="showBulkModal()">Import</button>
      <button class="btn btn-accent btn-sm" onclick="exportJSON()">Export</button>
    </div>
  </div>
  <div class="search-bar">
    <input type="text" class="search-input" id="searchInput" placeholder="Suchen..." oninput="renderList()">
  </div>
  <div class="list-scroll" id="listScroll"></div>
  <button class="list-fab" onclick="addEmployee()">+</button>
</div>

<div id="editView" class="view">
  <div class="hdr">
    <div class="hdr-left">
      <button class="btn btn-ghost btn-sm" onclick="showList()">← Liste</button>
    </div>
    <div style="font-size:12px;color:var(--mu);font-weight:600" id="editCounter"></div>
    <div class="hdr-actions">
      <button class="btn btn-ghost btn-sm" style="color:var(--rd)" onclick="deleteEmployee()">Löschen</button>
    </div>
  </div>
  <div class="edit-scroll" id="editScroll">
    <input type="text" class="edit-name" id="editName" placeholder="Name" oninput="saveField('name',this.value)">
    <label class="edit-label">Einleitungstext</label>
    <textarea class="edit-textarea" id="editText" rows="3" placeholder="Rolle, Kontext, Gesamteindruck..." oninput="saveField('text',this.value)" style="margin-bottom:16px"></textarea>
    <div class="category-card" style="border-top:3px solid var(--gn)">
      <div class="cat-header">
        <span class="cat-emoji">✅</span>
        <span class="cat-pill" style="background:rgba(0,184,148,.13);color:var(--gn)">Im Soll</span>
      </div>
      <textarea class="edit-textarea" id="editImSoll" rows="4" placeholder="Was läuft gut?" oninput="saveField('imSoll',this.value)"></textarea>
    </div>
    <div class="category-card" style="border-top:3px solid var(--or)">
      <div class="cat-header">
        <span class="cat-emoji">🔧</span>
        <span class="cat-pill" style="background:rgba(253,203,110,.13);color:var(--or)">Ausbaufähig</span>
      </div>
      <textarea class="edit-textarea" id="editAusbau" rows="4" placeholder="Wo geht noch mehr?" oninput="saveField('ausbaufaehig',this.value)"></textarea>
    </div>
    <div class="category-card" style="border-top:3px solid var(--rd)">
      <div class="cat-header">
        <span class="cat-emoji">📋</span>
        <span class="cat-pill" style="background:rgba(225,112,85,.13);color:var(--rd)">Todo</span>
      </div>
      <textarea class="edit-textarea" id="editTodo" rows="4" placeholder="Konkrete nächste Schritte" oninput="saveField('todo',this.value)"></textarea>
    </div>
  </div>
  <div class="edit-nav">
    <button class="btn btn-ghost" id="btnPrev" onclick="navigate(-1)">← Zurück</button>
    <button class="btn btn-accent" id="btnNext" onclick="navigate(1)">Weiter →</button>
  </div>
</div>

<div class="modal-overlay" id="bulkModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>Bulk Import</h2>
    <p>Ein Name pro Zeile</p>
    <textarea id="bulkText" placeholder="Max Mustermann&#10;Erika Musterfrau&#10;..."></textarea>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeBulkModal()">Abbrechen</button>
      <button class="btn btn-accent" id="bulkBtn" onclick="bulkImport()">Importieren</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="shareModal">
  <div class="modal share-modal">
    <div class="modal-handle"></div>
    <h2>JSON Export</h2>
    <p>Alles markieren → Kopieren → an Claude schicken</p>
    <textarea id="shareText" readonly></textarea>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeShareModal()">Schließen</button>
      <button class="btn btn-accent" onclick="copyShare()">Kopieren</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">✓ Kopiert!</div>

<script>
const SK='feedback-prep-data';
let emps=[], aidx=0;
function load(){try{emps=JSON.parse(localStorage.getItem(SK))||[]}catch(e){emps=[]}}
function save(){localStorage.setItem(SK,JSON.stringify(emps))}
function ne(n=''){return{id:Date.now()+Math.random(),name:n,text:'',imSoll:'',ausbaufaehig:'',todo:''}}
function filled(e){return e.name&&(e.imSoll||e.ausbaufaehig||e.todo)}

function renderList(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const f=emps.map((e,i)=>({...e,_i:i})).filter(e=>!q||e.name.toLowerCase().includes(q));
  const fc=emps.filter(filled).length;
  document.getElementById('counter').textContent=fc+'/'+emps.length+' ausgefüllt';
  const el=document.getElementById('listScroll');
  if(!emps.length){el.innerHTML='<div class="empty-state"><div class="big">💬</div><div style="font-size:15px;font-weight:600">Noch keine Mitarbeiter</div><div style="font-size:13px">Tippe + oder nutze Import</div></div>';return}
  el.innerHTML=f.map(e=>'<div class="list-item" onclick="openEdit('+e._i+')"><div class="li-dot '+(filled(e)?'filled':'empty')+'"></div><div class="li-info"><div class="li-name">'+(e.name||'Kein Name')+'</div><div class="li-meta">'+([ e.imSoll?'✅':'',e.ausbaufaehig?'🔧':'',e.todo?'📋':''].filter(Boolean).join(' ')||'Noch leer')+'</div></div><div class="li-arrow">›</div></div>').join('')
}

function showList(){document.getElementById('listView').classList.add('active');document.getElementById('editView').classList.remove('active');renderList()}
function addEmployee(){emps.push(ne());save();openEdit(emps.length-1)}
function deleteEmployee(){if(!confirm((emps[aidx]?.name||'Eintrag')+' löschen?'))return;emps.splice(aidx,1);save();showList()}

function openEdit(i){aidx=i;document.getElementById('listView').classList.remove('active');document.getElementById('editView').classList.add('active');popEdit()}
function popEdit(){
  const e=emps[aidx];if(!e)return showList();
  document.getElementById('editName').value=e.name;
  document.getElementById('editText').value=e.text;
  document.getElementById('editImSoll').value=e.imSoll;
  document.getElementById('editAusbau').value=e.ausbaufaehig;
  document.getElementById('editTodo').value=e.todo;
  document.getElementById('editScroll').scrollTop=0;
  document.getElementById('editCounter').textContent=(aidx+1)+'/'+emps.length;
  const p=document.getElementById('btnPrev'),n=document.getElementById('btnNext');
  p.disabled=aidx===0;p.style.opacity=aidx===0?.35:1;
  const last=aidx>=emps.length-1;n.textContent=last?'✓ Fertig':'Weiter →';
  if(!e.name)setTimeout(()=>document.getElementById('editName').focus(),100)
}
function saveField(f,v){emps[aidx][f]=v;save()}
function navigate(d){if(d===1&&aidx>=emps.length-1){showList();return}if(d===-1&&aidx===0)return;aidx+=d;popEdit()}

function showBulkModal(){document.getElementById('bulkModal').classList.add('active');document.getElementById('bulkText').value='';setTimeout(()=>document.getElementById('bulkText').focus(),100)}
function closeBulkModal(){document.getElementById('bulkModal').classList.remove('active')}
function bulkImport(){
  const ns=document.getElementById('bulkText').value.split('\n').map(n=>n.trim()).filter(Boolean);
  if(!ns.length)return;ns.forEach(n=>emps.push(ne(n)));save();closeBulkModal();renderList()
}

function exportJSON(){
  const d=emps.filter(e=>e.name).map(({name,text,imSoll,ausbaufaehig,todo})=>({name,text,imSoll,ausbaufaehig,todo}));
  const j=JSON.stringify(d,null,2);
  document.getElementById('shareText').value=j;
  document.getElementById('shareModal').classList.add('active');
  setTimeout(()=>{document.getElementById('shareText').select()},200);
}
function closeShareModal(){document.getElementById('shareModal').classList.remove('active')}
function copyShare(){
  const ta=document.getElementById('shareText');ta.select();
  if(navigator.clipboard?.writeText){navigator.clipboard.writeText(ta.value).then(showToast).catch(()=>{document.execCommand('copy');showToast()})}
  else{document.execCommand('copy');showToast()}
}
function showToast(){const t=document.getElementById('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}

let tsx=0;
document.getElementById('editView').addEventListener('touchstart',e=>{tsx=e.changedTouches[0].screenX},{passive:true});
document.getElementById('editView').addEventListener('touchend',e=>{const dx=e.changedTouches[0].screenX-tsx;if(Math.abs(dx)>80){if(dx>0&&aidx>0)navigate(-1);else if(dx<0&&aidx<emps.length-1)navigate(1)}},{passive:true});
document.getElementById('bulkModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeBulkModal()});
document.getElementById('shareModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeShareModal()});
document.getElementById('bulkText').addEventListener('input',function(){
  const c=this.value.split('\n').filter(n=>n.trim()).length;
  document.getElementById('bulkBtn').textContent=c?c+' importieren':'Importieren'
});
